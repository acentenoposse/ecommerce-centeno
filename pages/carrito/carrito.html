<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito de compras</title>
    <link rel="stylesheet" href="../../CSS/styles.css">
</head>
<body>

    <header></header>
    <main class="carrito-main">
        <h1>Carrito de compras</h1>
        <p id="info-usuario"></p>

        <table class="tabla-carrito">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Precio unitario</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tbody-carrito"></tbody>
        </table>

        <p id="total-carrito"></p>

        <button id="btn-vaciar">Vaciar carrito</button>
    </main>
    <footer></footer>
    <script type="module" src="../../index.js"></script>
    <script type="module" src="./carrito.js"></script>
    
</body>
</html>
