<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80" fill="none">
  <defs>
    <linearGradient id="pn-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6b2ff"/>
      <stop offset="60%" stop-color="#d643d6"/>
      <stop offset="100%" stop-color="#902cbe"/>
    </linearGradient>
    <filter id="pn-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Paleta estilizada -->
  <g transform="translate(10, 10)" filter="url(#pn-glow)">
    <!-- Mango -->
    <rect x="26" y="46" width="6" height="16" rx="2" fill="url(#pn-grad)"/>
    <!-- Cara de la paleta (elipse) -->
    <ellipse cx="29" cy="26" rx="22" ry="24" fill="none" stroke="url(#pn-grad)" stroke-width="3"/>
    <!-- Patrón de puntos -->
    <g fill="url(#pn-grad)">
      <circle cx="21" cy="18" r="1.6"/>
      <circle cx="29" cy="14" r="1.6"/>
      <circle cx="37" cy="18" r="1.6"/>
      <circle cx="17" cy="26" r="1.6"/>
      <circle cx="25" cy="26" r="1.6"/>
      <circle cx="33" cy="26" r="1.6"/>
      <circle cx="41" cy="26" r="1.6"/>
      <circle cx="21" cy="34" r="1.6"/>
      <circle cx="29" cy="34" r="1.6"/>
      <circle cx="37" cy="34" r="1.6"/>
      <circle cx="25" cy="42" r="1.6"/>
      <circle cx="33" cy="42" r="1.6"/>
    </g>
  </g>

  <!-- Texto -->
  <text x="74" y="34" font-family="'Sora', 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#ffffff" letter-spacing="1">PADEL</text>
  <text x="74" y="56" font-family="'Sora', 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="url(#pn-grad)" letter-spacing="2">NUESTRO</text>
</svg>
